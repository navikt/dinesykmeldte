fragment Soknad on Soknad {
    id
    sykmeldingId
    fnr
    navn
    fom
    tom
    lest
    korrigertBySoknadId
    perioder {
        ...Soknadperiode
    }
    sporsmal
}

fragment Soknadperiode on Soknadsperiode {
    fom
    tom
    sykmeldingstype
    sykmeldingsgrad
}

query SoknadById($soknadId: ID!) {
    soknad(soknadId: $soknadId) {
        ...Soknad
    }
}
